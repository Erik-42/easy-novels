<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy-Novel</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%236b7280' width='32' height='32' rx='4'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%23e5e7eb' font-size='18' font-family='system-ui'%3EE%3C/text%3E%3C/svg%3E" />
  <style>
    body { margin: 0; min-height: 100vh; background: #050816; color: #e4e7ec; font-family: system-ui, sans-serif; }
  </style>
  <link rel="stylesheet" href="./src/app.css" />
  <link rel="stylesheet" href="./src/components/Library/Library.css" />
  <link rel="stylesheet" href="./src/components/Outline/Outline.css" />
  <link rel="stylesheet" href="./src/components/Writing/Writing.css" />
  <link rel="stylesheet" href="./src/components/Organize/Organize.css" />
  <link rel="stylesheet" href="./src/components/Schedule/Schedule.css" />
  <link rel="stylesheet" href="./src/components/Modal/Modal.css" />
  <link rel="stylesheet" href="./src/components/Home/Home.css" />
  <link rel="stylesheet" href="./src/components/Notes/Notes.css" />
</head>
<body>
  <div id="app-root">
    <p style="padding: 2rem;">Chargement Easy-Novel…</p>
  </div>
  <div id="modal-root"></div>
  <script type="module" src="./src/app.js"></script>
  <script>
    window.addEventListener("error", function () {
      var r = document.getElementById("app-root");
      if (r && !r.querySelector(".app")) {
        r.innerHTML = "<p style='padding:2rem'>Erreur. Ouvrez la console (F12). Utilisez un serveur HTTP : <code>python -m http.server 9000</code> puis <a href='http://localhost:9000/' style='color:#93c5fd'>http://localhost:9000/</a></p>";
      }
    });
    setTimeout(function () {
      var r = document.getElementById("app-root");
      if (r && !r.querySelector(".app") && !r.querySelector("#app-load-error") && r.querySelector("p")) {
        r.innerHTML = "<p id='app-load-error' style='padding:2rem'>L'app n'a pas chargé. Lancez un serveur HTTP : <code style='background:#1e293b;padding:.2em .5em;border-radius:4px'>python -m http.server 9000</code>, puis <a href='http://localhost:9000/index-web.html' style='color:#93c5fd'>http://localhost:9000/index-web.html</a></p>";
      }
    }, 2500);
  </script>
</body>
</html>
